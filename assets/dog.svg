<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Body -->
  <ellipse cx="50" cy="58" rx="28" ry="18" fill="#C68642" stroke="#A0693A" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="28" cy="40" r="16" fill="#C68642" stroke="#A0693A" stroke-width="1.5"/>
  <!-- Ears -->
  <ellipse cx="16" cy="30" rx="7" ry="12" fill="#A0693A" transform="rotate(-15 16 30)"/>
  <ellipse cx="38" cy="28" rx="7" ry="12" fill="#A0693A" transform="rotate(15 38 28)"/>
  <!-- Snout -->
  <ellipse cx="22" cy="44" rx="8" ry="6" fill="#DAA06D"/>
  <!-- Nose -->
  <ellipse cx="18" cy="42" rx="3" ry="2.5" fill="#333"/>
  <!-- Eyes -->
  <circle cx="24" cy="36" r="3" fill="#333"/>
  <circle cx="34" cy="36" r="3" fill="#333"/>
  <circle cx="25" cy="35" r="1" fill="#FFF"/>
  <circle cx="35" cy="35" r="1" fill="#FFF"/>
  <!-- Mouth -->
  <path d="M 18 46 Q 22 50 26 46" fill="none" stroke="#333" stroke-width="1"/>
  <!-- Tongue -->
  <ellipse cx="22" cy="49" rx="3" ry="4" fill="#FF6B6B"/>
  <!-- Legs -->
  <rect x="30" y="70" width="8" height="16" rx="4" fill="#C68642"/>
  <rect x="42" y="70" width="8" height="16" rx="4" fill="#C68642"/>
  <rect x="55" y="70" width="8" height="16" rx="4" fill="#C68642"/>
  <rect x="67" y="70" width="8" height="16" rx="4" fill="#C68642"/>
  <!-- Tail -->
  <path d="M 78 52 Q 90 40 88 30" fill="none" stroke="#C68642" stroke-width="5" stroke-linecap="round"/>
  <!-- Paws -->
  <ellipse cx="34" cy="88" rx="5" ry="3" fill="#A0693A"/>
  <ellipse cx="46" cy="88" rx="5" ry="3" fill="#A0693A"/>
  <ellipse cx="59" cy="88" rx="5" ry="3" fill="#A0693A"/>
  <ellipse cx="71" cy="88" rx="5" ry="3" fill="#A0693A"/>
</svg>
