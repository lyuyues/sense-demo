<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Body -->
  <rect x="15" y="15" width="70" height="70" rx="8" fill="#444" stroke="#333" stroke-width="2"/>
  <!-- Speaker cone large -->
  <circle cx="50" cy="55" r="22" fill="#555" stroke="#666" stroke-width="2"/>
  <circle cx="50" cy="55" r="14" fill="#444" stroke="#555" stroke-width="1.5"/>
  <circle cx="50" cy="55" r="5" fill="#333"/>
  <!-- Tweeter -->
  <circle cx="50" cy="28" r="8" fill="#555" stroke="#666" stroke-width="1.5"/>
  <circle cx="50" cy="28" r="4" fill="#444"/>
  <!-- Sound waves -->
  <path d="M 88 40 Q 95 50 88 60" fill="none" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round"/>
  <path d="M 92 35 Q 100 50 92 65" fill="none" stroke="#FF6B6B" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Colored accent strip -->
  <rect x="15" y="15" width="70" height="4" rx="2" fill="#FF6B6B"/>
</svg>
