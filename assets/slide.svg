<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Slide surface -->
  <path d="M 25 20 L 25 30 L 75 85 L 85 85 L 85 75 L 35 20 Z" fill="#4A90D9" stroke="#3A7BC8" stroke-width="1.5"/>
  <!-- Left rail -->
  <line x1="25" y1="20" x2="75" y2="85" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <!-- Right rail -->
  <line x1="35" y1="20" x2="85" y2="85" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <!-- Ladder -->
  <line x1="20" y1="20" x2="20" y2="90" stroke="#FFD700" stroke-width="3"/>
  <line x1="35" y1="20" x2="35" y2="45" stroke="#FFD700" stroke-width="3"/>
  <!-- Ladder rungs -->
  <line x1="20" y1="30" x2="35" y2="30" stroke="#FFD700" stroke-width="2.5"/>
  <line x1="20" y1="42" x2="33" y2="42" stroke="#FFD700" stroke-width="2.5"/>
  <line x1="20" y1="54" x2="28" y2="54" stroke="#FFD700" stroke-width="2.5"/>
  <line x1="20" y1="66" x2="22" y2="66" stroke="#FFD700" stroke-width="2.5"/>
  <!-- Platform -->
  <rect x="18" y="18" width="20" height="5" rx="2" fill="#FFD700"/>
  <!-- Ground -->
  <line x1="70" y1="90" x2="95" y2="90" stroke="#8B7355" stroke-width="2"/>
</svg>
